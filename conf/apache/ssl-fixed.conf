<IfModule mod_ssl.c>
    <VirtualHost _default_:443>
        ServerName localhost
        DocumentRoot /home/ep/NetBeansProjects/Prodajalna_kart
        
        SSLEngine on
        SSLCertificateFile /etc/apache2/ssl/localhost.crt
        SSLCertificateKeyFile /etc/apache2/ssl/localhost.key
        
        <Directory /home/ep/NetBeansProjects/Prodajalna_kart>
            Options -Indexes +FollowSymLinks +MultiViews
            AllowOverride All
            Require all granted
            
            php_flag display_errors on
            php_value error_reporting E_ALL
        </Directory>
        
        <FilesMatch \.php$>
            SetHandler application/x-httpd-php
        </FilesMatch>
        
        ErrorLog ${APACHE_LOG_DIR}/ssl-fixed-error.log
        CustomLog ${APACHE_LOG_DIR}/ssl-fixed-access.log combined
    </VirtualHost>
</IfModule>

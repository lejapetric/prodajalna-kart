
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /home/ep/NetBeansProjects/Prodajalna_kart

    # PREUSMERJANJE HTTP → HTTPS
#    RewriteEngine On
#    RewriteCond %{HTTPS} off
#    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
    
    <Directory /home/ep/NetBeansProjects/Prodajalna_kart>
        Options -Indexes +FollowSymLinks +MultiViews
        AllowOverride All
        Require all granted
        
        php_flag display_errors on
        php_value error_reporting E_ALL
    </Directory>
    
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>
    
    ErrorLog ${APACHE_LOG_DIR}/prodajalna_error.log
    CustomLog ${APACHE_LOG_DIR}/prodajalna_access.log combined
</VirtualHost>
